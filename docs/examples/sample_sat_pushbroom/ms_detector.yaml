# Sample Pushbroom Imager: Pléiades MS
# ------------------------------------

# Pléiades Detector (CCD)
name: Pléiades MS Detector

detector_type: pushbroom
pixel_pitch: 52 um
horizontal_pixels: 7500
vertical_pixels: 5 # this is incorrect


# channels
channels:
    b0_blue:
      name: B0 blue
      horizontal_pixels: 7500 # exact value not known
      vertical_pixels: 1 # tdi_stages x read_blocks
      binning: 1
      tdi_stages: 1 # no TDI in MS
      read_blocks: 1
      cuton_wvl: 450 nm
      cutoff_wvl: 530 nm

    b1_green:
      name: B1 green
      horizontal_pixels: 7500 # exact value not known
      vertical_pixels: 1 # tdi_stages x read_blocks
      binning: 1
      tdi_stages: 1 # no TDI in MS
      read_blocks: 1
      cuton_wvl: 510 nm
      cutoff_wvl: 590 nm

    b2_red:
      name: B2 red
      horizontal_pixels: 7500 # exact value not known
      vertical_pixels: 1 # tdi_stages x read_blocks
      binning: 1
      tdi_stages: 1 # no TDI in MS
      read_blocks: 1
      cuton_wvl: 620 nm
      cutoff_wvl: 700 nm

    b3_nir:
      name: B3 NIR
      horizontal_pixels: 7500 # exact value not known
      vertical_pixels: 1 # tdi_stages x read_blocks
      binning: 1
      tdi_stages: 1 # no TDI in MS
      read_blocks: 1
      cuton_wvl: 775 nm
      cutoff_wvl: 915 nm

#  full_well_capacity = XX * u.e

# noise:
#   dark_current = XX * u.e/u.s
#   temporal_dark_noise = XX * u.e

timings:
    frame_rate: 2452.9 Hz  # native res 690 km altitude
    integration_duration: 0.12 ms # unknown
# frame duration that cannot be used for integration or imaging
#  frame overhead duration: XX * u.us
# time between frame durations that can be used for integration or imaging
#  frame overlap duration: XX * u.us

# Image sensor physical parameters
# e2v AT71554: back-thinned (BSI) silicon CCD; parameters estimated from literature
sensor_params:
  diffusion_model: bsi_1
  diffusion_length: 75 um    # estimated, 50-100 um range
  field_free_depth: 7 um     # estimated, 5-10 um range
  depletion_depth: 7 um      # estimated, 5-10 um range
  absorption_data:
    file: data/absorption/silicon_300k.txt
