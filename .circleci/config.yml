# Python CircleCI 2.1 configuration file
version: 2.1

orbs:
  coverage-reporter: codacy/coverage-reporter@14.1.0

jobs:

  codacy-coverage-report:

    docker:
      - image: cimg/python:3.13
    steps:
      - checkout
      - run:
          name: Install tox
          command: pip install tox
      - run:
          name: Generate coverage data
          command: tox -e coverage
      - coverage-reporter/send_report:
          coverage-reports: coverage.xml
          project-token: $CODACY_PROJECT_TOKEN


  tests:

    parameters:
      python-version:
        type: string

    docker:
      - image: cimg/python:<< parameters.python-version >>

    steps:
      - checkout
      - run:
          name: Install tox
          command: pip install tox
      - run:
          name: Run tests
          command: |
            set -e
            TEST_FILES=$(circleci tests glob "tests/**/test_*.py" | circleci tests split --split-by=timings)
            tox -e py$(echo << parameters.python-version >> | tr -d .) -- $TEST_FILES
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results


  codestyle:

    docker:
      - image: cimg/python:3.13

    steps:
      - checkout
      - run:
          name: Install tox
          command: pip install tox
      - run:
          name: Make sure style checks pass
          command: tox -e codestyle


workflows:
  tests_and_codestyle:
    jobs:
      - codestyle
      - tests:
          matrix:
            parameters:
              python-version: ["3.11", "3.12", "3.13", "3.14"]
  coverage:
    jobs:
      - codacy-coverage-report
