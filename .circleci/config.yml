# Python CircleCI 2.1 configuration file
version: 2.1

orbs:
  codecov: codecov/codecov@5.4.3

jobs:

  codecov-coverage-report:

    docker:
      - image: cimg/python:3.13
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install ".[test]" git+https://github.com/brandondube/prysm.git
      - run:
          name: Generate coverage data
          command: |
            coverage run --source opticks -m pytest
            coverage xml
            coverage report -m
      - codecov/upload:
          files: coverage.xml


  tests:

    parallelism: 2

    parameters:
      python-version:
        type: string

    docker:
      - image: cimg/python:<< parameters.python-version >>

    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install ".[test]" git+https://github.com/brandondube/prysm.git
      - run:
          name: Run tests
          command: |
            set -e
            TEST_FILES=$(circleci tests glob "tests/**/test_*.py" | circleci tests split --split-by=timings)
            pytest -vv --durations=0 --junitxml=test-results/test_output.xml $TEST_FILES
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results


  codestyle:

    docker:
      - image: cimg/python:3.13

    steps:
      - checkout
      - run:
          name: Install tox
          command: pip install tox ruff pyright
      - run:
          name: Make sure style checks pass
          command: tox -e codestyle


workflows:
  tests_and_codestyle:
    jobs:
      - codestyle
      - tests:
          matrix:
            parameters:
              python-version: ["3.11", "3.12", "3.13", "3.14"]
  coverage:
    jobs:
      - codecov-coverage-report
