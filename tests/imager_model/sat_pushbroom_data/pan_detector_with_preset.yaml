# PAN detector with diffusion_preset for testing
name: Pléiades PAN Detector

detector_type: pushbroom
pixel_pitch: 13 um
horizontal_pixels: 30000
vertical_pixels: 10

channels:
  pan:
    name: PAN
    horizontal_pixels: 30000
    vertical_pixels: 10
    binning: 1
    tdi_stages: 10
    read_blocks: 1
    cuton_wvl: 480 nm
    cutoff_wvl: 820 nm

timings:
  frame_rate: 9811.6 Hz
  integration_duration: 0.03 ms

sensor_params:
  diffusion_preset: scientific_ccd
  absorption_data:
    file: tests/imager_model/sat_pushbroom_data/silicon_300k.txt
